# Pilot Shell upstream manifest.
#
# Single source of truth for every upstream the installer touches. Each entry
# pins exact version + sha256 (or commit) + last-audited date.
# CI gates merges on this file via .github/workflows/supply-chain.yml
# (drift checker + manifest schema validation).
#
# Schema: installer/manifest.py:UpstreamEntry
# Audit log: `git log -p installer/upstreams.yaml`

version: 1
entries:
  - id: nvm-curl
    name: nvm install.sh (v0.40.6)
    source_type: curl
    source_url: https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.6/install.sh
    version: v0.40.6
    sha256: "2ef7e8d4373c1ffd70daa55f919f629e98a619543ffc0a8d892d77a5247e50e4"
    last_audited: "2026-07-21"

  # ---- npm globals (Task 2) ----

  - id: codegraph
    name: "@colbymchenry/codegraph"
    source_type: npm
    source_url: "@colbymchenry/codegraph"
    version: "1.4.1"
    # Highest-risk entry in this manifest per PRD: single-author npm package
    # with no public source repository declared. Manual audit only.
    last_audited: "2026-07-21"

  - id: better-sqlite3
    name: better-sqlite3
    source_type: npm
    source_url: better-sqlite3
    version: "12.11.1"
    # Native build via node-gyp at install time. CodeGraph relies on the
    # compiled native module (the WASM fallback corrupts SQLite databases on
    # certain filesystems). Postinstall scripts MUST be enabled.
    scripts_policy: allow
    scripts_justification: "native-build via node-gyp; required for CodeGraph SQLite backend"
    last_audited: "2026-07-21"

  - id: vtsls
    name: "@vtsls/language-server"
    source_type: npm
    source_url: "@vtsls/language-server"
    version: "0.3.0"
    last_audited: "2026-07-21"

  - id: typescript
    name: typescript
    source_type: npm
    source_url: typescript
    version: "6.0.3"
    # 7.0.2 available (2026-07-21) - held: major (native-compiler rewrite); verify console build before bumping.
    last_audited: "2026-07-21"

  - id: prettier
    name: prettier
    source_type: npm
    source_url: prettier
    version: "3.9.6"
    last_audited: "2026-07-21"

  - id: fast-check
    name: fast-check
    source_type: npm
    source_url: fast-check
    version: "4.9.0"
    last_audited: "2026-07-21"

  - id: impeccable
    name: "impeccable (design anti-pattern detector)"
    source_type: npm
    source_url: impeccable
    version: "3.2.1"
    # Apache-2.0. Deterministic frontend design anti-pattern detector; the
    # `impeccable detect` CLI runs the design-quality gate (no LLM, no API key).
    # Optional puppeteer dep (URL scanning) is skipped by the default
    # --ignore-scripts policy, so the install stays light (no Chromium download).
    # node-compat: tested on Node 22 (engines >=24; re-verify on Node 22 before bumping version)
    last_audited: "2026-07-21"

  - id: agent-browser
    name: agent-browser
    source_type: npm
    source_url: agent-browser
    version: "0.32.3"
    # High-risk single-author package per PRD threat model. Manual audit on bumps.
    last_audited: "2026-07-21"

  - id: playwright-cli
    name: "@playwright/cli"
    source_type: npm
    source_url: "@playwright/cli"
    version: "0.1.17"
    last_audited: "2026-07-21"

  # ---- curl-pipe installers (Task 3) ----

  - id: uv-installer
    name: astral.sh/uv/install.sh
    source_type: curl
    source_url: https://astral.sh/uv/install.sh
    version: "live-2026-07-21"
    sha256: "f633daff5c2a1b5e550d5dab074f21ab2d5fda2d147babf4525844ff1276e57e"
    # astral.sh does expose immutable per-version URLs, but Pilot deliberately
    # tracks the latest uv (decision 2026-06-12). The floating endpoint is
    # rewritten on every release, so the bootstrap runs it unpinned and this
    # hash is a monitoring snapshot, not an execution gate.
    soft_pin: true
    soft_pin_reason: "vendor-managed endpoint; deliberate decision to always install latest uv - script rewritten on every release"
    last_audited: "2026-07-21"

  - id: bun-installer
    name: bun.sh/install
    source_type: curl
    source_url: https://bun.sh/install
    version: "live-2026-05-27"
    sha256: "bab8acfb046aac8c72407bdcce903957665d655d7acaa3e11c7c4616beae68dd"
    # Bun does not expose immutable per-version install URLs (version is
    # selected via shell arg, not URL path); soft_pin. Hash mismatch logs a
    # re-pin warning instead of failing - same drift class as GH #147.
    soft_pin: true
    soft_pin_reason: "vendor-managed endpoint; bun.sh rewrites install script on every release with no per-version URL"
    last_audited: "2026-07-21"

  - id: homebrew-installer
    name: Homebrew/install/install.sh
    source_type: curl
    # Pinned to a specific commit (HEAD/install.sh would float).
    source_url: https://raw.githubusercontent.com/Homebrew/install/99e13e96cbbdc1ac1ac09c0a40b450bf219ef3aa/install.sh
    version: "commit-99e13e9"
    commit: "99e13e96cbbdc1ac1ac09c0a40b450bf219ef3aa"
    sha256: "99287f194a8b3c9e6b0203a11a5fa54518be57209343e6bb954dec4635796d9d"
    last_audited: "2026-07-21"

  - id: rtk-installer
    name: rtk-ai/rtk install.sh
    source_type: curl
    source_url: https://raw.githubusercontent.com/rtk-ai/rtk/66e09cbefe02bf82b159a44278250e45e506810b/install.sh
    version: "0.43.0"
    commit: "66e09cbefe02bf82b159a44278250e45e506810b"
    sha256: "d6eb73a772903e13ff34ee1be8a8b24e896ba9a978f20d2279a08b4083ea6f77"
    last_audited: "2026-07-21"

  - id: golangci-lint-installer
    name: golangci-lint install.sh
    source_type: curl
    source_url: https://raw.githubusercontent.com/golangci/golangci-lint/d5de4e14c8f811cc6294105b99d022a543687b63/install.sh
    version: "commit-d5de4e1"
    commit: "d5de4e14c8f811cc6294105b99d022a543687b63"
    sha256: "d32d3534af96cfd59546a084d22b213e8a47541cada5013aa8a84c4fa2589905"
    last_audited: "2026-07-21"

  # ---- Homebrew formulas (Task 4) ----
  # pin_kind: monitor - homebrew/core doesn't expose stable per-version installs;
  # the manifest records the version present at audit time and lets the gate
  # check tap origin. `brew_formula` is the formula name passed to
  # `brew install`; `auto_upgrade: false` opts the formula out of routine
  # `brew upgrade` so the manifest version stays the installed version.

  - id: git-brew
    name: git
    source_type: brew
    source_url: https://github.com/git/git
    version: "2.55.0"
    pin_kind: monitor
    auto_upgrade: false
    brew_formula: git
    brew_tap: homebrew/core
    last_audited: "2026-07-21"

  - id: gh-brew
    name: GitHub CLI
    source_type: brew
    source_url: https://github.com/cli/cli
    version: "2.96.0"
    pin_kind: monitor
    auto_upgrade: false
    brew_formula: gh
    brew_tap: homebrew/core
    last_audited: "2026-07-21"

  - id: python-3-12-brew
    name: Python 3.12
    source_type: brew
    source_url: https://github.com/python/cpython
    version: "3.12.13"
    pin_kind: monitor
    auto_upgrade: false
    brew_formula: "python@3.12"
    brew_tap: homebrew/core
    last_audited: "2026-07-21"

  - id: node-22-brew
    name: Node.js 22
    source_type: brew
    source_url: https://github.com/nodejs/node
    version: "22.23.1"
    pin_kind: monitor
    auto_upgrade: false
    brew_formula: "node@22"
    brew_tap: homebrew/core
    last_audited: "2026-07-21"

  - id: nvm-brew
    name: nvm (Homebrew install path)
    source_type: brew
    source_url: https://github.com/nvm-sh/nvm
    version: "0.40.6"
    pin_kind: monitor
    auto_upgrade: false
    brew_formula: nvm
    brew_tap: homebrew/core
    last_audited: "2026-07-21"

  - id: pnpm-brew
    name: pnpm
    source_type: brew
    source_url: https://github.com/pnpm/pnpm
    version: "11.15.1"
    pin_kind: monitor
    brew_formula: pnpm
    brew_tap: homebrew/core
    last_audited: "2026-07-21"

  - id: bun-brew
    name: bun
    source_type: brew
    source_url: https://github.com/oven-sh/bun
    version: "1.3.14"
    pin_kind: monitor
    brew_formula: bun
    # bun ships from oven-sh/bun tap (Pilot pre-taps it); intentional non-core origin.
    brew_tap: oven-sh/bun
    last_audited: "2026-07-21"

  - id: uv-brew
    name: uv (Homebrew install path)
    source_type: brew
    source_url: https://github.com/astral-sh/uv
    version: "0.11.30"
    pin_kind: monitor
    brew_formula: uv
    brew_tap: homebrew/core
    last_audited: "2026-07-21"

  - id: go-brew
    name: Go
    source_type: brew
    source_url: https://github.com/golang/go
    version: "1.26.5"
    pin_kind: monitor
    brew_formula: go
    brew_tap: homebrew/core
    last_audited: "2026-07-21"

  - id: gopls-brew
    name: gopls
    source_type: brew
    source_url: https://github.com/golang/tools
    version: "0.23.0"
    pin_kind: monitor
    brew_formula: gopls
    brew_tap: homebrew/core
    last_audited: "2026-07-21"

  - id: jq-brew
    name: jq
    source_type: brew
    source_url: https://github.com/jqlang/jq
    version: "1.8.2"
    pin_kind: monitor
    brew_formula: jq
    brew_tap: homebrew/core
    last_audited: "2026-07-21"

  - id: ripgrep-brew
    name: ripgrep
    source_type: brew
    source_url: https://github.com/BurntSushi/ripgrep
    version: "15.2.0"
    pin_kind: monitor
    brew_formula: ripgrep
    brew_tap: homebrew/core
    last_audited: "2026-07-21"

  - id: rtk-brew
    name: rtk (Homebrew install path)
    source_type: brew
    source_url: https://github.com/rtk-ai/rtk
    version: "0.43.0"
    pin_kind: monitor
    brew_formula: rtk
    brew_tap: homebrew/core
    last_audited: "2026-07-21"

  # ---- npx-launched MCP servers (Task 5) ----
  # Every entry MUST also be referenced from .mcp.json or pilot/.mcp.json
  # with `args: ["-y", "<source_url>@<version>"]`. Drift checker enforces this.

  - id: mcp-remote
    name: mcp-remote
    source_type: npm
    source_url: mcp-remote
    version: "0.1.38"
    last_audited: "2026-07-21"

  - id: context7-mcp
    name: "@upstash/context7-mcp"
    source_type: npm
    source_url: "@upstash/context7-mcp"
    version: "3.2.4"
    last_audited: "2026-07-21"

  - id: open-websearch
    name: open-websearch
    source_type: npm
    source_url: open-websearch
    version: "2.1.11"
    # No public source repo declared in npm registry; manual audit only.
    last_audited: "2026-07-21"

  - id: fetcher-mcp
    name: fetcher-mcp
    source_type: npm
    source_url: fetcher-mcp
    version: "0.3.9"
    # No public source repo declared in npm registry; manual audit only.
    last_audited: "2026-07-21"

  - id: zod
    name: zod
    source_type: npm
    source_url: zod
    version: "4.4.3"
    # Peer dep auto-installed into open-websearch's npx cache when missing
    # (see _fix_npx_peer_dependencies in installer/steps/dependencies.py).
    last_audited: "2026-07-21"

  # ---- PyPI bootstrap (Task 7) ----
  # Used by install.sh and launcher/build.py via `uv run --no-project --with`.
  # These run BEFORE the installer can read the manifest, so install.sh and
  # launcher/build.py read the version literals directly. CI cross-checks via
  # scripts/check_manifest_drift.py.

  - id: rich
    name: rich
    source_type: pypi
    source_url: https://github.com/Textualize/rich
    version: "15.0.0"
    last_audited: "2026-07-21"

  - id: certifi
    name: certifi
    source_type: pypi
    source_url: https://github.com/certifi/python-certifi
    version: "2026.6.17"
    last_audited: "2026-07-21"

  - id: cryptography
    name: cryptography
