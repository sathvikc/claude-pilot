    last_audited: "2026-05-07"

  - id: zod
    name: zod
    source_type: npm
    source_url: zod
    version: "4.4.3"
    # Peer dep auto-installed into open-websearch's npx cache when missing
    # (see _fix_npx_peer_dependencies in installer/steps/dependencies.py).
    last_audited: "2026-05-07"

  # ---- PyPI bootstrap (Task 7) ----
  # Used by install.sh and launcher/build.py via `uv run --no-project --with`.
  # These run BEFORE the installer can read the manifest, so install.sh and
  # launcher/build.py read the version literals directly. CI cross-checks via
  # scripts/check_manifest_drift.py.

  - id: rich
    name: rich
    source_type: pypi
    source_url: https://github.com/Textualize/rich
    version: "14.2.0"
    last_audited: "2026-05-07"

  - id: certifi
    name: certifi
    source_type: pypi
    source_url: https://github.com/certifi/python-certifi
    version: "2026.4.22"
    last_audited: "2026-05-07"

  - id: cryptography
