# Pilot Shell upstream manifest.
#
# Single source of truth for every upstream the installer touches. Each entry
# pins exact version + sha256 (or commit) + last-audited date.
# CI gates merges on this file via .github/workflows/supply-chain.yml
# (drift checker + manifest schema validation).
#
# Schema: installer/manifest.py:UpstreamEntry
# Audit log: `git log -p installer/upstreams.yaml`

version: 1
entries:
  - id: nvm-curl
    name: nvm install.sh (v0.40.4)
    source_type: curl
    source_url: https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh
    version: v0.40.4
    sha256: "4b7412c49960c7d31e8df72da90c1fb5b8cccb419ac99537b737028d497aba4f"
    last_audited: "2026-05-27"

  # ---- npm globals (Task 2) ----

  - id: codegraph
    name: "@colbymchenry/codegraph"
    source_type: npm
    source_url: "@colbymchenry/codegraph"
    version: "0.9.8"
    # Highest-risk entry in this manifest per PRD: single-author npm package
    # with no public source repository declared. Manual audit only.
    last_audited: "2026-06-01"

  - id: better-sqlite3
    name: better-sqlite3
    source_type: npm
    source_url: better-sqlite3
    version: "12.10.0"
    # Native build via node-gyp at install time. CodeGraph relies on the
    # compiled native module (the WASM fallback corrupts SQLite databases on
    # certain filesystems). Postinstall scripts MUST be enabled.
    scripts_policy: allow
    scripts_justification: "native-build via node-gyp; required for CodeGraph SQLite backend"
    last_audited: "2026-05-27"

  - id: vtsls
    name: "@vtsls/language-server"
    source_type: npm
    source_url: "@vtsls/language-server"
    version: "0.3.0"
    last_audited: "2026-05-27"

  - id: typescript
    name: typescript
    source_type: npm
    source_url: typescript
    version: "6.0.3"
    last_audited: "2026-05-27"

  - id: prettier
    name: prettier
    source_type: npm
    source_url: prettier
    version: "3.8.3"
    last_audited: "2026-05-27"

  - id: fast-check
    name: fast-check
    source_type: npm
    source_url: fast-check
    version: "4.8.0"
    last_audited: "2026-05-27"

  - id: agent-browser
    name: agent-browser
    source_type: npm
    source_url: agent-browser
    version: "0.27.0"
    # High-risk single-author package per PRD threat model. Manual audit on bumps.
    last_audited: "2026-05-27"

  - id: playwright-cli
    name: "@playwright/cli"
    source_type: npm
    source_url: "@playwright/cli"
    version: "0.1.13"
    last_audited: "2026-05-27"

  # ---- curl-pipe installers (Task 3) ----

  - id: uv-installer
    name: astral.sh/uv/install.sh (0.11.16)
    source_type: curl
    # Per-version URL is immutable on astral.sh — picking a version pins the
    # installed uv release and removes the drift problem of the floating
    # /install.sh endpoint (see GH #147).
    source_url: https://astral.sh/uv/0.11.16/install.sh
    version: "0.11.16"
    sha256: "b9f925505899533f36a3acfdf8684c661ff2d5c8735f759fca768367b5996123"
    last_audited: "2026-05-27"

  - id: bun-installer
    name: bun.sh/install
    source_type: curl
    source_url: https://bun.sh/install
    version: "live-2026-05-27"
    sha256: "bab8acfb046aac8c72407bdcce903957665d655d7acaa3e11c7c4616beae68dd"
    # Bun does not expose immutable per-version install URLs (version is
    # selected via shell arg, not URL path); soft_pin. Hash mismatch logs a
    # re-pin warning instead of failing — same drift class as GH #147.
    soft_pin: true
    soft_pin_reason: "vendor-managed endpoint; bun.sh rewrites install script on every release with no per-version URL"
    last_audited: "2026-05-27"

  - id: homebrew-installer
    name: Homebrew/install/install.sh
    source_type: curl
    # Pinned to a specific commit (HEAD/install.sh would float).
    source_url: https://raw.githubusercontent.com/Homebrew/install/5753984d1eb214c40e86489416be2d38972f836a/install.sh
    version: "commit-5753984"
    commit: "5753984d1eb214c40e86489416be2d38972f836a"
    sha256: "f3e91784ffeda32bc397de7acc1154724cc47522a459c9ac656cca176eeba457"
    last_audited: "2026-05-27"

  - id: rtk-installer
    name: rtk-ai/rtk install.sh
    source_type: curl
    source_url: https://raw.githubusercontent.com/rtk-ai/rtk/5a149a7fdb92afe758a0c28d805873ce61d8259f/install.sh
    version: "commit-5a149a7"
    commit: "5a149a7fdb92afe758a0c28d805873ce61d8259f"
    sha256: "ab22d109f920db7d931ef6aa97d9460d93f41d296981db8446afed96ea9661e5"
    last_audited: "2026-05-27"

  - id: golangci-lint-installer
    name: golangci-lint install.sh
    source_type: curl
    source_url: https://raw.githubusercontent.com/golangci/golangci-lint/2bff0e3f1cc5f6dcd18755dc3a0d9e997f2bdef2/install.sh
    version: "commit-2bff0e3"
    commit: "2bff0e3f1cc5f6dcd18755dc3a0d9e997f2bdef2"
    sha256: "d32d3534af96cfd59546a084d22b213e8a47541cada5013aa8a84c4fa2589905"
    last_audited: "2026-05-27"

  # ---- Homebrew formulas (Task 4) ----
  # pin_kind: monitor — homebrew/core doesn't expose stable per-version installs;
  # the manifest records the version present at audit time and lets the gate
  # check tap origin. `brew_formula` is the formula name passed to
  # `brew install`; `auto_upgrade: false` opts the formula out of routine
  # `brew upgrade` so the manifest version stays the installed version.

  - id: git-brew
    name: git
    source_type: brew
    source_url: https://github.com/git/git
    version: "2.54.0"
    pin_kind: monitor
    auto_upgrade: false
    brew_formula: git
    brew_tap: homebrew/core
    last_audited: "2026-05-27"

  - id: gh-brew
    name: GitHub CLI
    source_type: brew
    source_url: https://github.com/cli/cli
    version: "2.92.0"
    pin_kind: monitor
    auto_upgrade: false
    brew_formula: gh
    brew_tap: homebrew/core
    last_audited: "2026-05-27"

  - id: python-3-12-brew
    name: Python 3.12
    source_type: brew
    source_url: https://github.com/python/cpython
    version: "3.12.13"
    pin_kind: monitor
    auto_upgrade: false
    brew_formula: "python@3.12"
    brew_tap: homebrew/core
    last_audited: "2026-05-27"

  - id: node-22-brew
    name: Node.js 22
    source_type: brew
    source_url: https://github.com/nodejs/node
    version: "22.22.3"
    pin_kind: monitor
    auto_upgrade: false
    brew_formula: "node@22"
    brew_tap: homebrew/core
    last_audited: "2026-05-27"

  - id: nvm-brew
    name: nvm (Homebrew install path)
    source_type: brew
    source_url: https://github.com/nvm-sh/nvm
    version: "0.40.4"
    pin_kind: monitor
    auto_upgrade: false
    brew_formula: nvm
    brew_tap: homebrew/core
    last_audited: "2026-05-27"

  - id: pnpm-brew
    name: pnpm
    source_type: brew
    source_url: https://github.com/pnpm/pnpm
    version: "11.3.0"
    pin_kind: monitor
    brew_formula: pnpm
    brew_tap: homebrew/core
    last_audited: "2026-05-27"

  - id: bun-brew
    name: bun
    source_type: brew
    source_url: https://github.com/oven-sh/bun
    version: "1.3.14"
    pin_kind: monitor
    brew_formula: bun
    # bun ships from oven-sh/bun tap (Pilot pre-taps it); intentional non-core origin.
    brew_tap: oven-sh/bun
    last_audited: "2026-05-27"

  - id: uv-brew
    name: uv (Homebrew install path)
    source_type: brew
    source_url: https://github.com/astral-sh/uv
    version: "0.11.16"
    pin_kind: monitor
    brew_formula: uv
    brew_tap: homebrew/core
    last_audited: "2026-05-27"

  - id: go-brew
    name: Go
    source_type: brew
    source_url: https://github.com/golang/go
    version: "1.26.3"
    pin_kind: monitor
    brew_formula: go
    brew_tap: homebrew/core
    last_audited: "2026-05-27"

  - id: gopls-brew
    name: gopls
    source_type: brew
    source_url: https://github.com/golang/tools
    version: "0.22.0"
    pin_kind: monitor
    brew_formula: gopls
    brew_tap: homebrew/core
    last_audited: "2026-05-27"

  - id: jq-brew
    name: jq
    source_type: brew
    source_url: https://github.com/jqlang/jq
    version: "1.8.1"
    pin_kind: monitor
    brew_formula: jq
